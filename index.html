<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link

  rel="stylesheet"
/>

<!-- Tailwind + config -->
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          bg: { dark: "#070612", light: "#F5F1EA" },
          text: {
            "dark-primary": "#FFFFFF",
            "dark-body": "#B8B8B8",
            "light-primary": "#1A1612",
            "light-body": "#5C5550",
          },
          accent: { coral: "#DA745C", gold: "#C9985C", blue: "#063CA1" },
        },
        fontFamily: {
          serif: ["Fraunces", "serif"],
          sans: ["Inter", "sans-serif"],
          mono: ["JetBrains Mono", "monospace"],
        },
      },
    },
  };
</script>

<style>
  html, body { background: #070612; }
  body {
    font-family: "Inter", sans-serif;
    color: #FFFFFF;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  /* Hide scrollbar for testimonial carousel */
  .scrollbar-hide::-webkit-scrollbar { display: none; }
  .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

  /* Smooth scroll on anchor links */
  html { scroll-behavior: smooth; }

  /* Subtle paper grain on light sections — adds premium tactility */
  .grain-light {
    position: relative;
  }
  .grain-light::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(rgba(26,22,18,0.04) 1px, transparent 1px),
      radial-gradient(rgba(26,22,18,0.03) 1px, transparent 1px);
    background-size: 3px 3px, 7px 7px;
    background-position: 0 0, 1px 1px;
    pointer-events: none;
    z-index: 0;
  }
  .grain-light > * { position: relative; z-index: 1; }
</style>
</head>
<body class="bg-bg-dark text-white">
<div id="root"></div>

<!-- Suppress benign framer-motion internal dev-mode key warning (not source-code-related) -->
<script>
  (function(){
    const orig = console.error.bind(console);
    console.error = function(...a){
      const s = typeof a[0] === 'string' ? a[0] : '';
      if (s.includes('unique "key"') && (a.join('|').includes('framer-motion'))) {
        return; // drop
      }
      orig(...a);
    };
  })();
</script>
