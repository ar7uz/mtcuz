<style>
  html, body { background: #070612; }
  body {
    font-family: "Inter", sans-serif;
    color: #FFFFFF;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  .scrollbar-hide::-webkit-scrollbar { display: none; }
  .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
  html { scroll-behavior: smooth; }
  .grain-light { position: relative; }
  .grain-light::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(rgba(26,22,18,0.04) 1px, transparent 1px),
      radial-gradient(rgba(26,22,18,0.03) 1px, transparent 1px);
    background-size: 3px 3px, 7px 7px;
    background-position: 0 0, 1px 1px;
    pointer-events: none;
    z-index: 0;
  }
  .grain-light > * { position: relative; z-index: 1; }

  /* Admin styling — light theme */
  .admin-root { background: #F5F1EA; color: #1A1612; min-height: 100vh; }
  .admin-root input, .admin-root textarea, .admin-root select {
    background: white; border: 1px solid #D7D2C9; border-radius: 8px;
    padding: 10px 12px; width: 100%; color: #1A1612;
    font-size: 14px; transition: border-color 0.15s;
  }
  .admin-root input:focus, .admin-root textarea:focus, .admin-root select:focus {
    outline: none; border-color: #063CA1; box-shadow: 0 0 0 3px rgba(6,60,161,0.08);
  }
  .admin-root label { font-size: 12px; font-weight: 500; color: #5C5550; display: block; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
  .admin-btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 18px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; transition: opacity 0.15s, transform 0.15s; border: none; }
  .admin-btn:active { transform: scale(0.98); }
  .admin-btn-primary { background: #063CA1; color: white; }
  .admin-btn-primary:hover { opacity: 0.9; }
  .admin-btn-danger { background: #DC2626; color: white; }
  .admin-btn-danger:hover { opacity: 0.9; }
  .admin-btn-ghost { background: transparent; color: #1A1612; border: 1px solid #D7D2C9; }
  .admin-btn-ghost:hover { background: #EFEAE2; }
  .admin-btn:disabled { opacity: 0.5; cursor: not-allowed; }
</style>

<!-- Suppress benign framer-motion internal dev-mode key warning -->
<script>
  (function(){
    const orig = console.error.bind(console);
    console.error = function(...a){
      const s = typeof a[0] === 'string' ? a[0] : '';
      if (s.includes('unique "key"') && (a.join('|').includes('framer-motion'))) return;
      orig(...a);
    };
  })();
</script>
